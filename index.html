<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f12;--s1:#161920;--s2:#1c2028;--bd:#252a35;
  --t1:#e8e6e3;--t2:#8b8d94;--t3:#55575e;
  --shenzhen:#E8A838;--shenzhen-bg:#2a2210;
  --foshan:#3B9AE1;--foshan-bg:#0f1e2e;
  --yiwu:#E85D4A;--yiwu-bg:#2a1512;
  --guangzhou:#5DC77A;--guangzhou-bg:#122218;
  --ok:#5DC77A;--r:14px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{display:none}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}

/* ---- HEADER ---- */
.hdr{padding:20px 20px 14px;text-align:center}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--shenzhen),var(--yiwu),var(--foshan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr .sub{font-size:12px;color:var(--t2);margin-top:4px}

/* ---- CITY TABS ---- */
.ctabs{display:flex;gap:4px;padding:0 16px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ctab{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .25s;border:1px solid var(--bd);background:var(--s1)}
.ctab .sm{font-size:10px;opacity:.6;display:block}

/* ---- CARD ---- */
.card{margin:0 16px 12px;padding:18px 20px;border-radius:var(--r);border:1px solid var(--bd)}
.card h2{font-size:22px;font-weight:800;letter-spacing:-.5px}
.card .meta{font-size:12px;color:var(--t2);margin-top:4px}
.hotel-box{margin-top:14px;padding:12px 14px;border-radius:var(--rs);background:rgba(255,255,255,.03);border:1px solid var(--bd)}
.hotel-box .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);font-weight:600}
.hotel-box .nm{font-size:13px;font-weight:500;margin-top:4px}
.hotel-cn{font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:600;margin-top:6px;padding:8px 12px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.hotel-cn .hint{font-size:10px;font-family:'Outfit';opacity:.5}
.ftag{display:inline-block;margin-top:10px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(255,255,255,.04);border:1px solid var(--bd)}

/* ---- PROGRESS ---- */
.prog{margin:0 16px 14px;padding:14px 18px;border-radius:var(--r);background:var(--s1);border:1px solid var(--bd)}
.prog .row{font-size:11px;color:var(--t2);font-weight:600;display:flex;justify-content:space-between}
.prog .track{height:6px;border-radius:3px;background:var(--bd);margin-top:8px;overflow:hidden}
.prog .fill{height:100%;border-radius:3px;transition:width .4s}

/* ---- SECTION TABS ---- */
.stabs{display:flex;gap:2px;padding:0 16px 12px}
.stab{flex:1;padding:10px 6px;font-size:11px;font-weight:600;text-align:center;border-radius:var(--rs);transition:all .2s;border:1px solid var(--bd);background:var(--s1);color:var(--t3)}
.stab.on{background:var(--s2)}

/* ---- DAY PILLS ---- */
.dpills{display:flex;gap:6px;padding:0 16px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.dpill{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .2s;border:1px solid var(--bd);background:var(--s1);color:var(--t2)}
.dpill .ico{margin-right:4px}

/* ---- DAY HEADER ---- */
.dhdr{padding:0 20px 14px}
.dhdr h3{font-size:17px;font-weight:700}
.dhdr .dd{font-size:12px;color:var(--t2);margin-top:2px}

/* ---- SCHEDULE ---- */
.slist{padding:0 16px;display:flex;flex-direction:column;gap:6px}
.sitem{display:flex;gap:12px;padding:14px 16px;border-radius:var(--rs);background:var(--s1);border:1px solid var(--bd);transition:all .2s;border-left-width:3px}
.sitem.done{opacity:.45}
.sitem.done .act{text-decoration:line-through}
.schk{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:2px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:12px;font-weight:700;color:#000}
.schk.on{border-color:var(--ok);background:var(--ok)}
.sleft{min-width:76px;flex-shrink:0}
.stime{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;line-height:1.4}
.scost{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:4px}
.sright{flex:1;min-width:0}
.act{font-size:13px;font-weight:600;line-height:1.3}
.tip{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.5}

/* ---- MARKETS ---- */
.mlist{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.mcard{padding:16px;border-radius:var(--rs);background:var(--s1);border:1px solid var(--bd)}
.mname{font-size:14px;font-weight:700}
.mcn{font-family:'Noto Sans SC',sans-serif;font-size:13px;margin-top:4px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.mcn .ci{font-size:10px;opacity:.3}
.mfocus{font-size:12px;color:var(--t2);margin-top:6px}
.mtime{font-size:11px;color:var(--t3);margin-top:4px}
.stars{color:#E8A838;letter-spacing:2px;font-size:13px}

/* ---- PHRASES ---- */
.plist{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.pcard{padding:16px 18px;border-radius:var(--rs);background:var(--s1);border:1px solid var(--bd);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.pcard:active{transform:scale(.98)}
.pcn{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700}
.pen{font-size:12px;color:var(--t2);text-align:right;max-width:45%}

/* ---- FOOD ---- */
.flist{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.fcard{padding:14px 16px;border-radius:var(--rs);background:var(--s1);border:1px solid var(--bd)}
.fdish{font-size:14px;font-weight:600}
.fwhere{font-size:12px;color:var(--t2);margin-top:4px}
.fprice{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);margin-top:4px}

/* ---- BUDGET ---- */
.bsec{padding:0 16px}
.bsum{padding:20px;border-radius:var(--r);background:var(--s1);border:1px solid var(--bd);margin-bottom:14px}
.bsum .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);font-weight:600}
.bsum .amt{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;margin-top:6px}
.bsum .rng{font-size:12px;color:var(--t2);margin-top:8px}
.bsum .rng span{font-family:'JetBrains Mono',monospace}
.bentries{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.bentry{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:var(--rs);background:var(--s1);border:1px solid var(--bd);font-size:13px}
.bentry .cat{font-weight:500}
.bentry .note{font-size:10px;color:var(--t3);margin-top:2px}
.bentry .val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px}
.bdel{font-size:12px;color:var(--t3);margin-left:8px;cursor:pointer;padding:2px}
.bform{padding:16px;border-radius:var(--r);background:var(--s1);border:1px solid var(--bd)}
.bform h4{font-size:13px;font-weight:700;margin-bottom:12px}
.frow{display:flex;gap:8px;margin-bottom:8px}
.finp{flex:1;padding:10px 14px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--bd);color:var(--t1);font-size:13px;outline:none}
.finp::placeholder{color:var(--t3)}
.fsel{padding:10px 14px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--bd);color:var(--t1);font-size:13px;outline:none;-webkit-appearance:none;flex:1}
.badd{width:100%;padding:12px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:none;color:#000}
.badd:active{transform:scale(.98)}

/* ---- AI CHAT ---- */
.ai-btn{position:fixed;bottom:88px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#E8A838,#E85D4A);display:flex;align-items:center;justify-content:center;font-size:22;box-shadow:0 4px 20px rgba(232,93,74,.4);z-index:60;transition:transform .2s}
.ai-btn:active{transform:scale(.9)}
.ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.ai-panel{max-width:480px;width:100%;margin:0 auto;background:var(--bg);border-radius:20px 20px 0 0;max-height:80vh;display:flex;flex-direction:column;border:1px solid var(--bd);border-bottom:none}
.ai-hdr{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ai-hdr .title{font-size:15px;font-weight:700}
.ai-hdr .desc{font-size:11px;color:var(--t2);margin-top:2px}
.ai-msgs{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.ai-msg.user{align-self:flex-end;background:linear-gradient(135deg,#E8A838,#E85D4A);color:#000;font-weight:500}
.ai-msg.bot{align-self:flex-start;background:var(--s2);border:1px solid var(--bd)}
.ai-input-row{padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--bd);display:flex;gap:8px;flex-shrink:0}
.ai-input{flex:1;padding:12px 16px;border-radius:12px;border:1px solid var(--bd);background:var(--s1);color:var(--t1);font-size:14px;outline:none}
.ai-send{padding:0 18px;border-radius:12px;font-weight:700;font-size:14px;transition:all .2s}
.ai-welcome{text-align:center;padding:24px 16px}
.ai-welcome .emoji{font-size:32px;margin-bottom:12px}
.ai-welcome h4{font-size:14px;font-weight:600;margin-bottom:8px}
.ai-welcome p{font-size:12px;color:var(--t2);line-height:1.6}

/* API KEY */
.api-box{margin:0 16px;padding:14px;border-radius:var(--rs);background:var(--s1);border:1px solid var(--bd);margin-bottom:12px}
.api-box .row{display:flex;gap:8px;margin-top:8px}
.api-box .info{font-size:11px;color:var(--t2);line-height:1.5}

/* ---- BOTTOM NAV ---- */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(22,25,32,.92);border-top:1px solid var(--bd);display:flex;justify-content:center;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:50;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.bnav-inner{display:flex;gap:4px;max-width:480px;width:100%;padding:0 12px}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:10px;font-size:10px;font-weight:600;color:var(--t3);transition:all .2s}
.nbtn .ni{font-size:18px}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;background:var(--s2);border:1px solid var(--bd);color:var(--ok);z-index:200;white-space:nowrap;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

const $=s=>document.querySelector(s);
let toastTimer;
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
function copy(t){navigator.clipboard?navigator.clipboard.writeText(t).then(()=>toast('\u2705 Copied: '+t)):fallbackCopy(t)}
function fallbackCopy(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';document.body.appendChild(a);a.select();try{document.execCommand('copy');toast('\u2705 Copied: '+t)}catch(e){}document.body.removeChild(a)}
function stars(n){return '\u2605'.repeat(n)+'\u2606'.repeat(3-n)}
function ck(di,si){return S.city+'-'+di+'-'+si}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function render(){
  const td=S.tripData;
  const c=td[S.city];
  const day=c.days[S.di]||c.days[0];
  if(!day){S.di=0}
  const d=c.days[S.di];

  // Progress
  let total=0,done=0;
  c.days.forEach((dy,di)=>dy.schedule.forEach((_,si)=>{total++;if(S.chk[ck(di,si)])done++}));
  const pct=total?Math.round(done/total*100):0;

  let h='';

  // Header
  h+=`<div class="hdr"><h1>\uD83C\uDDE8\uD83C\uDDF3 China Sourcing Trip</h1><div class="sub">April 6\u201328, 2025</div></div>`;

  // City tabs
  h+=`<div class="ctabs">`;
  for(const[k,v]of Object.entries(td)){
    const on=S.city===k;
    h+=`<button class="ctab" style="border-color:${on?v.color:'var(--bd)'};background:${on?v.bg:'var(--s1)'};color:${on?v.color:'var(--t2)'}" onclick="sw('${k}')">${v.name}<span class="sm">${v.dates}</span></button>`;
  }
  h+=`</div>`;

  // City header
  h+=`<div class="card" style="border-color:${c.color}20;background:${c.bg}">
    <h2 style="color:${c.color}">${c.name}</h2>
    <div class="meta">${c.dates} \u2022 ${c.sub}</div>
    <div class="hotel-box">
      <div class="lbl">Hotel</div>
      <div class="nm">${esc(c.hotel)}</div>
      <div class="hotel-cn" style="background:${c.color}15;color:${c.color}" onclick="copy('${c.hotelCn}')">
        <span>${c.hotelCn}</span><span class="hint">TAP TO COPY</span>
      </div>
    </div>
    <div class="ftag" style="color:${c.color}">${esc(c.focus)}</div>
  </div>`;

  // Progress
  h+=`<div class="prog"><div class="row"><span>Progress</span><span>${done}/${total} \u2022 ${pct}%</span></div>
    <div class="track"><div class="fill" style="width:${pct}%;background:${c.color}"></div></div></div>`;

  // Section tabs
  h+=`<div class="stabs">`;
  ['schedule','markets','phrases','food','budget'].forEach(s=>{
    const on=S.sec===s;
    h+=`<button class="stab${on?' on':''}" style="${on?'color:'+c.color+';border-color:'+c.color+'40':''}" onclick="ss('${s}')">${s[0].toUpperCase()+s.slice(1)}</button>`;
  });
  h+=`</div>`;

  // === SCHEDULE ===
  if(S.sec==='schedule'){
    h+=`<div class="dpills">`;
    c.days.forEach((dy,i)=>{
      const on=S.di===i;
      h+=`<button class="dpill" style="${on?'background:'+c.bg+';color:'+c.color+';border-color:'+c.color:''}" onclick="sd(${i})"><span class="ico">${dy.icon}</span> ${dy.day}</button>`;
    });
    h+=`</div>`;
    h+=`<div class="dhdr"><h3 style="color:${c.color}">${esc(d.title)}</h3><div class="dd">${d.date}</div></div>`;
    h+=`<div class="slist">`;
    d.schedule.forEach((s,i)=>{
      const key=ck(S.di,i);
      const dn=!!S.chk[key];
      h+=`<div class="sitem${dn?' done':''}" style="border-left-color:${c.color}">
        <div class="schk${dn?' on':''}" onclick="tc('${key}')">${dn?'\u2713':''}</div>
        <div class="sleft">
          <div class="stime" style="color:${c.color}">${s.time}</div>
          ${s.cost!=='\u2014'?`<div class="scost">${s.cost}</div>`:''}
        </div>
        <div class="sright">
          <div class="act">${esc(s.act)}</div>
          <div class="tip">${esc(s.tip)}</div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  // === MARKETS ===
  if(S.sec==='markets'){
    h+=`<div class="mlist">`;
    c.markets.forEach(m=>{
      h+=`<div class="mcard">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="mname">${esc(m.name)}</div><div class="stars">${stars(m.stars)}</div>
        </div>
        <div class="mcn" style="color:${c.color}" onclick="copy('${m.cn}')">${m.cn} <span class="ci">\uD83D\uDCCB</span></div>
        <div class="mfocus">${esc(m.focus)}</div>
        <div class="mtime">Best: ${m.time}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  // === PHRASES ===
  if(S.sec==='phrases'){
    h+=`<div class="plist">`;
    c.phrases.forEach(p=>{
      h+=`<div class="pcard" onclick="copy('${p.cn}')">
        <div class="pcn" style="color:${c.color}">${p.cn}</div>
        <div class="pen">${esc(p.en)}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  // === FOOD ===
  if(S.sec==='food'){
    h+=`<div class="flist">`;
    c.food.forEach(f=>{
      h+=`<div class="fcard">
        <div class="fdish">${esc(f.dish)}</div>
        <div class="fwhere">\uD83D\uDCCD ${esc(f.where)}</div>
        ${f.price?`<div class="fprice">${f.price}</div>`:''}
      </div>`;
    });
    h+=`</div>`;
  }

  // === BUDGET ===
  if(S.sec==='budget'){
    const entries=S.bud.filter(e=>e.city===S.city);
    const total=entries.reduce((s,e)=>s+e.amount,0);
    h+=`<div class="bsec">
      <div class="bsum" style="border-color:${c.color}30">
        <div class="lbl">Total Spent \u2013 ${c.name}</div>
        <div class="amt" style="color:${c.color}">\u00A5${total.toLocaleString()}</div>
        <div class="rng">Estimated: <span>${c.budget.low}</span> \u2013 <span>${c.budget.high}</span></div>
      </div>`;
    if(entries.length){
      h+=`<div class="bentries">`;
      entries.forEach(e=>{
        const idx=S.bud.indexOf(e);
        h+=`<div class="bentry"><div><div class="cat">${esc(e.category)}</div>${e.note?`<div class="note">${esc(e.note)}</div>`:''}</div>
          <div style="display:flex;align-items:center"><span class="val" style="color:${c.color}">\u00A5${e.amount.toLocaleString()}</span>
          <button class="bdel" onclick="db(${idx})">\u2715</button></div></div>`;
      });
      h+=`</div>`;
    }
    h+=`<div class="bform"><h4>\u2795 Add Expense</h4>
      <div class="frow">
        <select class="fsel" id="bc"><option>Food</option><option>Transport</option><option>Shopping</option><option>Hotel</option><option>Samples</option><option>Other</option></select>
        <input class="finp" id="ba" type="number" placeholder="\u00A5 Amount">
      </div>
      <div class="frow"><input class="finp" id="bn" placeholder="Note (optional)" style="width:100%"></div>
      <button class="badd" style="background:${c.color}" onclick="ab()">Add Expense</button>
    </div></div>`;
  }

  // AI Chat button
  h+=`<button class="ai-btn" onclick="openAI()">\uD83E\uDD16</button>`;

  // Bottom nav
  h+=`<div class="bnav"><div class="bnav-inner">`;
  [{id:'schedule',ic:'\uD83D\uDCC5',lb:'Schedule'},{id:'markets',ic:'\uD83C\uDFEA',lb:'Markets'},{id:'phrases',ic:'\uD83D\uDDE3\uFE0F',lb:'Phrases'},{id:'food',ic:'\uD83C\uDF5C',lb:'Food'},{id:'budget',ic:'\uD83D\uDCB0',lb:'Budget'}].forEach(n=>{
    h+=`<button class="nbtn" style="${S.sec===n.id?'color:'+c.color:''}" onclick="ss('${n.id}')"><span class="ni">${n.ic}</span>${n.lb}</button>`;
  });
  h+=`</div></div>`;

  $('#app').innerHTML=h;
  save();
}

// ==================== AI CHAT ====================
let aiOpen=false,aiMsgs=[];

function openAI(){
  aiOpen=true;
  renderAI();
}

function renderAI(){
  if(!aiOpen)return;
  const c=S.tripData[S.city];
  let h=`<div class="ai-overlay" onclick="if(event.target===this)closeAI()">
    <div class="ai-panel">
      <div class="ai-hdr">
        <div><div class="title">\uD83E\uDD16 Trip AI Assistant</div><div class="desc">Edit schedule, translate, budget tips</div></div>
        <button onclick="closeAI()" style="font-size:20px;color:var(--t3)">\u2715</button>
      </div>`;

  // API Key input
  if(!S.apiKey){
    h+=`<div style="padding:16px">
      <div class="api-box">
        <div class="info">\uD83D\uDD11 Enter your Claude API key to enable AI features. Get one free at <strong>console.anthropic.com</strong></div>
        <div class="row">
          <input class="finp" id="apiKeyInput" type="password" placeholder="sk-ant-..." style="flex:1">
          <button class="badd" style="background:${c.color};padding:10px 16px;width:auto" onclick="saveKey()">Save</button>
        </div>
        <div class="info" style="margin-top:8px">\uD83D\uDD12 Key is stored locally on your device only.</div>
      </div>
    </div>`;
  }

  // Messages
  h+=`<div class="ai-msgs" id="aiMsgs">`;
  if(!aiMsgs.length){
    h+=`<div class="ai-welcome"><div class="emoji">\uD83C\uDDE8\uD83C\uDDF3</div><h4>How can I help?</h4>
      <p>Try: "Change Day 3 dinner to hot pot"<br>"Translate 'where is the nearest ATM'"<br>"Add a market to Foshan"<br>"How can I save money in Yiwu?"</p></div>`;
  }
  aiMsgs.forEach(m=>{
    h+=`<div class="ai-msg ${m.role==='user'?'user':'bot'}">${esc(m.content).replace(/\n/g,'<br>')}</div>`;
  });
  h+=`</div>`;

  // Input
  h+=`<div class="ai-input-row">
    <input class="ai-input" id="aiInp" placeholder="${S.apiKey?'Ask me anything...':'Enter API key above first'}" ${S.apiKey?'':'disabled'} onkeydown="if(event.key==='Enter')sendAI()">
    <button class="ai-send" style="background:${c.color};color:#000" onclick="sendAI()">\u2191</button>
  </div>`;

  h+=`</div></div>`;
  
  let overlay=document.getElementById('aiOverlay');
  if(!overlay){overlay=document.createElement('div');overlay.id='aiOverlay';document.body.appendChild(overlay)}
  overlay.innerHTML=h;
  const msgs=document.getElementById('aiMsgs');
  if(msgs)msgs.scrollTop=msgs.scrollHeight;
}

function closeAI(){aiOpen=false;const o=document.getElementById('aiOverlay');if(o)o.innerHTML='';}

function saveKey(){
  const v=document.getElementById('apiKeyInput')?.value?.trim();
  if(v&&v.startsWith('sk-')){S.apiKey=v;save();renderAI();toast('\u2705 API key saved!')}
  else{toast('Enter a valid key starting with sk-')}
}

async function sendAI(){
  const inp=document.getElementById('aiInp');
  if(!inp||!inp.value.trim()||!S.apiKey)return;
  const msg=inp.value.trim();
  inp.value='';
  aiMsgs.push({role:'user',content:msg});
  renderAI();

  const sys=`You are an AI travel assistant for a China sourcing trip (Apr 6-28, 2025). Cities: Shenzhen, Foshan, Yiwu, Guangzhou.
Help with: editing schedules, adding items, budget advice, translating phrases.
When MODIFYING data, include a JSON block in \`\`\`json ... \`\`\` with action field:
edit_schedule: {"action":"edit_schedule","city":"foshan","dayIdx":0,"schedIdx":2,"fields":{"act":"New","tip":"New"}}
add_schedule: {"action":"add_schedule","city":"foshan","dayIdx":0,"item":{"time":"14:00","act":"Act","cost":"$20","tip":"Tip"}}
add_phrase: {"action":"add_phrase","city":"foshan","phrase":{"cn":"Chinese","en":"English"}}
add_food: {"action":"add_food","city":"yiwu","food":{"dish":"Name","where":"Loc","price":"$10"}}
Be concise and practical.`;

  const ctx=`Current city: ${S.city}. Data: ${JSON.stringify(S.tripData[S.city]).slice(0,2000)}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,
        messages:[...aiMsgs.slice(-8).map(m=>({role:m.role,content:m.role==='user'?ctx+'\n\nUser: '+m.content:m.content}))]}),
    });
    const data=await res.json();
    let text=data.content?.map(b=>b.text||'').join('')||'Sorry, could not process.';

    // Apply actions
    const jm=text.match(/```json\s*([\s\S]*?)```/);
    if(jm){
      try{
        const act=JSON.parse(jm[1]);
        if(act.action==='edit_schedule'){Object.assign(S.tripData[act.city].days[act.dayIdx].schedule[act.schedIdx],act.fields)}
        else if(act.action==='add_schedule'){S.tripData[act.city].days[act.dayIdx].schedule.push(act.item)}
        else if(act.action==='add_phrase'){S.tripData[act.city].phrases.push(act.phrase)}
        else if(act.action==='add_food'){S.tripData[act.city].food.push(act.food)}
        save();render();toast('\u2705 Trip updated!');
      }catch(e){}
    }
    text=text.replace(/```json[\s\S]*?```/g,'').trim();
    aiMsgs.push({role:'assistant',content:text||'Done! Updated your trip.'});
  }catch(e){
    aiMsgs.push({role:'assistant',content:'Connection issue. Check your API key and try again.'});
  }
  renderAI();
}

// ==================== ACTIONS ====================
window.sw=(k)=>{S.city=k;S.di=0;S.sec='schedule';render()};
window.sd=(i)=>{S.di=i;render()};
window.ss=(s)=>{S.sec=s;render()};
window.tc=(k)=>{S.chk[k]=!S.chk[k];render()};
window.ab=()=>{
  const a=parseFloat($('#ba')?.value);
  if(!a||a<=0){toast('Enter a valid amount');return}
  S.bud.push({city:S.city,category:$('#bc').value,amount:a,note:$('#bn')?.value||'',ts:Date.now()});
  render();toast('Added \u00A5'+a);
};
window.db=(i)=>{S.bud.splice(i,1);render()};
window.copy=copy;
window.openAI=openAI;
window.closeAI=closeAI;
window.saveKey=saveKey;
window.sendAI=sendAI;

// ==================== INIT ====================
render();
</script>
</body>
</html>
