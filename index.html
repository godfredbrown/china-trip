.nbtn .ni{font-size:18px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.panel{max-width:480px;width:100%;background:var(--bg);border-radius:20px 20px 0 0;max-height:85vh;display:flex;flex-direction:column;border:1px solid var(--bd);border-bottom:none}

.fullimg{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer}
.fullimg img{max-width:100%;max-height:80vh;border-radius:12px}

const $=s=>document.querySelector(s);
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
function copy(t){navigator.clipboard?navigator.clipboard.writeText(t).then(()=>toast('\u2705 Copied: '+t)):fallbackCopy(t)}
function fallbackCopy(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';document.body.appendChild(a);a.select();try{document.execCommand('copy');toast('\u2705 Copied: '+t)}catch(e){}document.body.removeChild(a)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function stars(n){return '\u2605'.repeat(n)+'\u2606'.repeat(3-n)}

function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=0.75;u.pitch=1;
  const v=speechSynthesis.getVoices();const zh=v.find(x=>x.lang.startsWith('zh'));if(zh)u.voice=zh;
  speechSynthesis.speak(u);
}

function renderLogin(){
  $('#app').innerHTML=`

      <h1 style="font-size:24px;font-weight:800;background:linear-gradient(135deg,#E8A838,#E85D4A,#3B9AE1);-webkit-background-clip:text;-webkit-text-fill-color:transparent">China Sourcing Trip</h1>
      <p style="color:var(--t2);font-size:13px;margin-top:6px">April 6 - May 2, 2025</p>
      <div id="loginMode" style="margin-top:32px;display:flex;gap:4px;background:var(--s1);border-radius:12px;padding:4px;border:1px solid var(--bd)">
        <button onclick="setLoginMode('login')" id="btnLogin" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;background:var(--s2);color:var(--t1)">Log In</button>
        <button onclick="setLoginMode('signup')" id="btnSignup" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;background:transparent;color:var(--t3)">Sign Up</button>
      </div>
      <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
        <input id="lName" placeholder="Your name" style="width:100%;padding:14px 18px;border-radius:12px;border:1px solid var(--bd);background:var(--s1);color:var(--t1);font-size:15px;outline:none;box-sizing:border-box">
        <input id="lPin" placeholder="4-digit PIN" type="password" maxlength="4" style="width:100%;padding:14px 18px;border-radius:12px;border:1px solid var(--bd);background:var(--s1);color:var(--t1);font-size:15px;outline:none;box-sizing:border-box;letter-spacing:8px;text-align:center">
        <div id="lErr" style="color:#E85D4A;font-size:12px;display:none"></div>
        <button onclick="doLogin()" style="width:100%;padding:16px;border-radius:12px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#E8A838,#E85D4A);color:#000">Log In</button>
      </div>
      <p style="color:var(--t3);font-size:11px;margin-top:16px">\uD83D\uDD12 Data stored locally per user</p>
    </div>
  </div>`;
  $('#lPin').onkeydown=e=>{if(e.key==='Enter')doLogin()};
}
let loginMode='login';
window.setLoginMode=m=>{loginMode=m;$('#btnLogin').style.background=m==='login'?'var(--s2)':'transparent';$('#btnLogin').style.color=m==='login'?'var(--t1)':'var(--t3)';$('#btnSignup').style.background=m==='signup'?'var(--s2)':'transparent';$('#btnSignup').style.color=m==='signup'?'var(--t1)':'var(--t3)'};
window.doLogin=()=>{
  const n=$('#lName').value.trim().toLowerCase(),p=$('#lPin').value.trim();
  if(!n||!p){$('#lErr').style.display='block';$('#lErr').textContent='Enter name and PIN';return}
  const uk=K+'u:'+n,pk=K+'p:'+n;
  if(loginMode==='signup'){
    if(localStorage.getItem(pk)){$('#lErr').style.display='block';$('#lErr').textContent='Name taken';return}
    localStorage.setItem(pk,p);localStorage.setItem(uk,JSON.stringify({chk:{},bud:[],notes:{},fairCats:{}}));
    S.user=n;saveS();loadUser();render();
  }else{
    const sp=localStorage.getItem(pk);
    if(!sp){$('#lErr').style.display='block';$('#lErr').textContent='Not found. Sign up first';return}
    if(sp!==p){$('#lErr').style.display='block';$('#lErr').textContent='Wrong PIN';return}
    S.user=n;saveS();loadUser();render();
  }
};

  // Bottom nav
  h+=`<div class="bnav"><div class="bnav-in">`;
  secs.forEach(n=>{h+=`<button class="nbtn" style="${S.sec===n.id?'color:'+c.color:''}" onclick="ss('${n.id}')"><span class="ni">${n.ic}</span>${n.lb}</button>`});

    <input id="nNote" placeholder="Notes (products, prices, MOQs...)" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font-size:13px;outline:none;margin-bottom:8px;box-sizing:border-box">
    <input id="nFile" type="file" accept="image/*" capture="environment" style="display:none" onchange="previewCard(this)">
    <button onclick="document.getElementById('nFile').click()" id="cardBtn" style="width:100%;padding:10px 0;border-radius:8px;font-size:12px;font-weight:600;border:1px dashed var(--bd);color:var(--t3);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px">\uD83D\uDCF7 Upload Business Card</button>
    <div id="cardPreview" style="display:none;margin-bottom:8px"><img id="cardImg" style="width:100%;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--bd)"></div>
    <button onclick="addNote()" style="width:100%;padding:12px;border-radius:8px;font-size:13px;font-weight:700;background:${c.color};color:#000">Add Contact</button></div>`;

  h+=`</div></div></div>`;
  let el=document.getElementById('notesOverlay');
  if(!el){el=document.createElement('div');el.id='notesOverlay';document.body.appendChild(el)}
  el.innerHTML=h;
}

let pendingCard=null;
window.previewCard=input=>{
  const f=input.files?.[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{
    pendingCard=e.target.result;
    const p=document.getElementById('cardPreview'),img=document.getElementById('cardImg'),btn=document.getElementById('cardBtn');
    if(p)p.style.display='block';if(img)img.src=pendingCard;
    if(btn){btn.innerHTML='\u2705 Card attached - tap to change';btn.style.borderColor=D[S.city].color;btn.style.color=D[S.city].color}
  };r.readAsDataURL(f);
};
window.addNote=()=>{
  const n=$('#nName')?.value?.trim();if(!n)return;
  if(!U.notes[curNK])U.notes[curNK]=[];
  U.notes[curNK].push({name:n,phone:$('#nPhone')?.value||'',wechat:$('#nWechat')?.value||'',note:$('#nNote')?.value||'',card:pendingCard,ts:Date.now()});
  pendingCard=null;saveU();renderNotes();render();
};
window.rmNote=i=>{if(!U.notes[curNK])return;U.notes[curNK].splice(i,1);saveU();renderNotes();render()};
window.closeNotes=()=>{curNK=null;pendingCard=null;const el=document.getElementById('notesOverlay');if(el)el.innerHTML=''};
window.viewCard=()=>{/* handled inline */};

// ==================== ACTIONS ====================
window.sc=k=>{S.city=k;S.sec='markets';render();window.scrollTo(0,0)};
window.ss=s=>{S.sec=s;render()};
window.tc=k=>{U.chk[k]=!U.chk[k];saveU();render()};
window.logout=()=>{S.user=null;saveS();render()};
window.ab=()=>{const a=parseFloat($('#ba')?.value);if(!a||a<=0){toast('Enter valid amount');return}U.bud.push({city:S.city,cat:$('#bc').value,amt:a,note:$('#bn')?.value||'',ts:Date.now()});saveU();render();toast('Added \u00A5'+a)};
window.db=i=>{U.bud.splice(i,1);saveU();render()};
window.addCat=()=>{const v=$('#newCat')?.value?.trim();if(!v)return;if(!U.fairCats[S.city])U.fairCats[S.city]=[...(D[S.city].defCats||[])];U.fairCats[S.city].push(v);saveU();render()};
window.rmCat=i=>{if(!U.fairCats[S.city])U.fairCats[S.city]=[...(D[S.city].defCats||[])];U.fairCats[S.city].splice(i,1);saveU();render()};

window.playPh=(i,text)=>{
  speak(text);
  const el=document.getElementById('ph'+i);if(!el)return;
  const c=D[S.city].color;
  const btn=el.querySelector('button');if(btn){btn.style.borderColor=c;btn.style.background=c+'20';btn.style.animation='pulse 1s ease infinite';btn.innerHTML='\uD83D\uDD0A'}
  const cn=el.querySelector('[style*="Noto Sans SC"]');if(cn)cn.style.color=c;
  el.style.borderColor=c+'60';
  const dur=Math.max(1500,text.length*400);
  setTimeout(()=>{if(btn){btn.style.borderColor='var(--bd)';btn.style.background='transparent';btn.style.animation='none';btn.innerHTML='\u25B6'}if(cn)cn.style.color='var(--t1)';el.style.borderColor='var(--bd)'},dur);
};

window.copy=copy;

// ==================== INIT ====================
if(S.user)loadUser();
speechSynthesis?.getVoices();
render();
</script>
</body>
</html>
